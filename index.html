<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Corretor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#f4f7fb;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

        }

        .container{

            width:420px;

            background:white;

            border-radius:20px;

            padding:40px;

            box-shadow:0 15px 40px rgba(0,0,0,.08);

        }

        h1{

            color:#0f172a;

            margin-bottom:10px;

        }

        p{

            color:#777;

            margin-bottom:30px;

        }

        .card{

            background:#2563eb;

            color:white;

            padding:25px;

            border-radius:15px;

            text-decoration:none;

            display:block;

            transition:.25s;

        }

        .card:hover{

            transform:translateY(-5px);

        }

        .card h2{

            margin-bottom:10px;

        }

    </style>

</head>

<body>

<div class="container">

<h1>🏠 Click Corretor</h1>

<p>Ferramentas inteligentes para corretores.</p>

<a class="card" href="#">

<h2>📄 Calculadora de Documentação</h2>

<span>Versão 1.0</span>

</a>

</div>

</body>

</html>
